<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Meme Generator</h1>
        
        <!-- Template Selection Screen -->
        <div id="template-selection" class="template-screen">
            <h2>Choose Your Meme Template</h2>
            <div class="template-grid">
                <div class="template-option"  onclick="selectImg('https://i.imgflip.com/1bij.jpg')">
                    <img src="https://i.imgflip.com/1bij.jpg" alt="Drake Pointing">
                    <p>Drake Pointing</p>
                </div>
                <div class="template-option" onclick="selectImg('https://i.imgflip.com/30b1gx.jpg')">
                    <img src="https://i.imgflip.com/30b1gx.jpg" alt="This is Fine">
                    <p>This is Fine</p>
                </div>
                <div class="template-option" onclick="selectImg('https://i.imgflip.com/1g8my4.jpg')">
                    <img src="https://i.imgflip.com/1g8my4.jpg" alt="Distracted Boyfriend">
                    <p>Distracted Boyfriend</p>
                </div>
                <div class="template-option" onclick="selectImg('https://i.imgflip.com/26am.jpg')">
                    <img src="https://i.imgflip.com/26am.jpg" alt="Surprised Pikachu">
                    <p>Surprised Pikachu</p>
                </div>
                <div class="template-option" onclick="selectImg('https://media.tenor.com/28ZaziH4y1kAAAAM/ugly-plankton-meme-ugly-plankton.gif')">
                    <img src="https://media.tenor.com/28ZaziH4y1kAAAAM/ugly-plankton-meme-ugly-plankton.gif" alt="Expanding Brain">
                    <p>AAHHHHH</p>
                </div>
                <div class="template-option" onclick="selectImg('https://media.tenor.com/3zvcxCJ9QeEAAAAM/tetriandoch.gif')">
                    <img src="https://media.tenor.com/3zvcxCJ9QeEAAAAM/tetriandoch.gif" alt="Woman Yelling at Cat">
                    <p>Shreksito</p>
                </div>
                <div class="template-option" onclick="selectImg('https://i.imgflip.com/1otk96.jpg')">
                    <img src="https://i.imgflip.com/1otk96.jpg" alt="Panik Kalm Panik">
                    <p>Panik Kalm Panik</p>
                </div>
                <div class="template-option" onclick="selectImg('https://i.imgflip.com/1c1uej.jpg')">
                    <img src="https://i.imgflip.com/1c1uej.jpg" alt="Leonardo DiCaprio">
                    <p>Leonardo DiCaprio</p>
                </div>
                <div class="template-option" onclick="selectImg('https://media.tenor.com/OFm43w7wEegAAAAM/yujiro-hanma-baki.gif')">
                    <img src="https://media.tenor.com/OFm43w7wEegAAAAM/yujiro-hanma-baki.gif" alt="Disaster Girl">
                    <p>Baki</p>
                </div>
                <div class="template-option" onclick="selectImg('https://external-preview.redd.it/anyone-have-a-template-unedited-image-of-the-spongebob-v0-qyJPbHPRYYUH-KjJ_MbRJzG6fju5klzxBqZpC8Y4xVU.jpg?auto=webp&s=00e949324cf9bf595db7aceef00b9fb20b9839f9')">
                    <img src="https://external-preview.redd.it/anyone-have-a-template-unedited-image-of-the-spongebob-v0-qyJPbHPRYYUH-KjJ_MbRJzG6fju5klzxBqZpC8Y4xVU.jpg?auto=webp&s=00e949324cf9bf595db7aceef00b9fb20b9839f9" alt="Left Exit 12">
                    <p>Sponge Bob</p>
                </div>
                <div class="template-option" onclick="selectImg('https://i.redd.it/i-just-remembered-what-the-new-wigglytuff-full-art-card-v0-0zw9fi0c4ore1.jpg?width=1080&format=pjpg&auto=webp&s=205eb366bb5ac0ac8649cba212488fd111d52a59')">
                    <img src="https://i.redd.it/i-just-remembered-what-the-new-wigglytuff-full-art-card-v0-0zw9fi0c4ore1.jpg?width=1080&format=pjpg&auto=webp&s=205eb366bb5ac0ac8649cba212488fd111d52a59" alt="Bernie Sanders">
                    <p>I Robot</p>
                </div>
                <div class="template-option" onclick="selectImg('https://media1.tenor.com/m/9MuzJyg8HbIAAAAC/robert-downey-jr-huh.gif')">
                    <img src="https://media1.tenor.com/m/9MuzJyg8HbIAAAAC/robert-downey-jr-huh.gif" alt="Grumpy Cat">
                    <p>Stark</p>
                </div>
                <div class="template-option" onclick="selectImg('')">
                    <img id="custom-image" src="" alt="custom iamge">
                </div>
            </div>
        </div>

        <!-- Meme Editor Screen (hidden initially) -->
        <div id="meme-editor" class="editor-screen" style="display: none;">
            <button onclick="goBack()" id="back-button">← Back to Templates</button>
            
            <div class="meme-section">
                <div class="meme-canvas">
                    <img id="meme-image" src="" alt="Meme Image">
                    <div class="text-overlay">
                        <div id="top-text" class="meme-text top">TOP TEXT</div>
                        <div id="bottom-text" class="meme-text bottom">BOTTOM TEXT</div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="input-group">
                    <label for="top-input">Top Text:</label>
                    <input type="text" id="top-input" placeholder="Enter top text">
                </div>
                
                <div class="input-group">
                    <label for="bottom-input">Bottom Text:</label>
                    <input type="text" id="bottom-input" placeholder="Enter bottom text">
                </div>
                
                <button onclick="updateMeme()" id="update-meme">Update Meme</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
